<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🎮 3rb.io Multibox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            font-family: Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4fc3f7;
            flex-shrink: 0;
        }
        .header h1 { color: #4fc3f7; font-size: 18px; }
        .header .info { color: #888; font-size: 12px; }

        /* اللاعبين */
        .players {
            display: flex;
            flex: 1;
            gap: 4px;
            padding: 4px;
            height: calc(100vh - 60px);
        }
        .player {
            flex: 1;
            background: #111;
            border-radius: 8px;
            border: 2px solid #333;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }
        .player.active-p1 { border-color: #4caf50; box-shadow: 0 0 30px rgba(76,175,80,0.15); }
        .player.active-p2 { border-color: #ff9800; box-shadow: 0 0 30px rgba(255,152,0,0.15); }

        .player .label {
            position: absolute;
            top: 10px;
            left: 15px;
            z-index: 5;
            background: rgba(0,0,0,0.8);
            padding: 3px 12px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        .player .label.p1 { color: #4caf50; border-color: #4caf50; }
        .player .label.p2 { color: #ff9800; border-color: #ff9800; }

        .player iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        /* أزرار التحكم */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.92);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            display: flex;
            gap: 10px;
            align-items: center;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        .controls button {
            padding: 5px 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .controls button:hover { transform: scale(1.05); }
        .btn-p1 { background: #4caf50; color: white; }
        .btn-p2 { background: #ff9800; color: white; }
        .btn-switch { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .controls .key { color: #666; font-size: 11px; background: #1a1a1a; padding: 2px 10px; border-radius: 4px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎮 Multibox</h1>
        <span class="info">P1 ● P2 ● TAB للتبديل</span>
    </div>

    <div class="players">
        <div class="player active-p1" id="box1">
            <div class="label p1">🔵 P1</div>
            <iframe id="frame1" src="https://3rb.io"></iframe>
        </div>
        <div class="player" id="box2">
            <div class="label p2">🟠 P2</div>
            <iframe id="frame2" src="https://3rb.io"></iframe>
        </div>
    </div>

    <div class="controls">
        <button class="btn-p1" id="btn1">P1</button>
        <button class="btn-switch" id="btnSwitch">🔄 TAB</button>
        <button class="btn-p2" id="btn2">P2</button>
        <span class="key">⌨️ TAB</span>
    </div>

    <script>
        let current = 1;

        function setActive(p) {
            current = p;
            const b1 = document.getElementById('box1');
            const b2 = document.getElementById('box2');
            b1.classList.remove('active-p1', 'active-p2');
            b2.classList.remove('active-p1', 'active-p2');
            if (p === 1) b1.classList.add('active-p1');
            else b2.classList.add('active-p2');
        }

        function switchPlayer() {
            setActive(current === 1 ? 2 : 1);
        }

        document.getElementById('btn1').onclick = () => setActive(1);
        document.getElementById('btn2').onclick = () => setActive(2);
        document.getElementById('btnSwitch').onclick = switchPlayer;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                switchPlayer();
            }
        });

        console.log('✅ Multibox جاهز!');
    </script>
</body>
</html>
