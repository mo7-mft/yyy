<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3rb.io - Multibox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        .game-area {
            flex: 1;
            position: relative;
            background: #0f0f2a;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 40, 0.95);
            border-left: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 100vh;
        }
        
        .sidebar h2 {
            color: #ffd700;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .settings {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
        }
        
        .settings label {
            display: block;
            font-size: 13px;
            color: #aaa;
            padding: 4px 0;
            cursor: pointer;
        }
        
        .settings label input {
            margin-right: 8px;
        }
        
        .targets {
            display: flex;
            gap: 10px;
        }
        
        .target-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .target-btn.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        
        .target-btn .status {
            display: block;
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        
        .total-mass {
            text-align: center;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 8px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .total-mass .number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }
        
        .quick-btn {
            padding: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .quick-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .quick-btn:active {
            transform: scale(0.9);
        }
        
        .team-players {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .team-btn {
            padding: 6px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        
        .team-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        
        .grid-btn {
            padding: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .grid-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        
        .grid-btn:active {
            transform: scale(0.9);
        }
        
        .grid-btn.row-a { border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .grid-btn.row-b { border-color: rgba(33, 150, 243, 0.3); color: #2196F3; }
        .grid-btn.row-c { border-color: rgba(255, 193, 7, 0.3); color: #FFC107; }
        .grid-btn.row-d { border-color: rgba(255, 152, 0, 0.3); color: #FF9800; }
        .grid-btn.row-e { border-color: rgba(244, 67, 54, 0.3); color: #f44336; }
        
        .error-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <div class="sidebar">
            <h2>🎮 Multibox</h2>
            
            <div class="settings">
                <label><input type="checkbox" checked id="biggestCell"> BIGGEST CELL VIEWPORT</label>
                <label><input type="checkbox" checked id="followMouse"> VIEWPORT FOLLOWING MOUSE</label>
                <label><input type="checkbox" id="targetingPlayers"> TARGETING PLAYERS</label>
            </div>
            
            <div class="targets">
                <button class="target-btn active" id="target1">
                    🎯 Target 1
                    <span class="status" id="target1Status">P1</span>
                </button>
                <button class="target-btn" id="target2">
                    🎯 Target 2
                    <span class="status" id="target2Status">P2</span>
                </button>
            </div>
            
            <div class="total-mass">
                TOTAL MASS
                <div class="number" id="totalMass">0</div>
            </div>
            
            <div class="quick-buttons">
                <button class="quick-btn" data-cmd="follow">Follow</button>
                <button class="quick-btn" data-cmd="split">Split</button>
                <button class="quick-btn" data-cmd="eject">Eject</button>
                <button class="quick-btn" data-cmd="merge">Merge</button>
                <button class="quick-btn" data-cmd="stop">Stop</button>
                <button class="quick-btn" data-cmd="target">Target</button>
            </div>
            
            <div style="text-align:center;font-size:13px;color:#aaa;">Team players</div>
            <div class="team-players">
                <button class="team-btn" data-team="1">👤 1</button>
                <button class="team-btn" data-team="2">👤 2</button>
                <button class="team-btn" data-team="3">👤 3</button>
            </div>
            
            <div class="grid-buttons">
                <button class="grid-btn row-a" data-key="A1">A1</button>
                <button class="grid-btn row-a" data-key="A2">A2</button>
                <button class="grid-btn row-a" data-key="A3">A3</button>
                <button class="grid-btn row-a" data-key="A4">A4</button>
                <button class="grid-btn row-a" data-key="A5">A5</button>
                
                <button class="grid-btn row-b" data-key="B1">B1</button>
                <button class="grid-btn row-b" data-key="B2">B2</button>
                <button class="grid-btn row-b" data-key="B3">B3</button>
                <button class="grid-btn row-b" data-key="B4">B4</button>
                <button class="grid-btn row-b" data-key="B5">B5</button>
                
                <button class="grid-btn row-c" data-key="C1">C1</button>
                <button class="grid-btn row-c" data-key="C2">C2</button>
                <button class="grid-btn row-c" data-key="C3">C3</button>
                <button class="grid-btn row-c" data-key="C4">C4</button>
                <button class="grid-btn row-c" data-key="C5">C5</button>
                
                <button class="grid-btn row-d" data-key="D1">D1</button>
                <button class="grid-btn row-d" data-key="D2">D2</button>
                <button class="grid-btn row-d" data-key="D3">D3</button>
                <button class="grid-btn row-d" data-key="D4">D4</button>
                <button class="grid-btn row-d" data-key="D5">D5</button>
                
                <button class="grid-btn row-e" data-key="E1">E1</button>
                <button class="grid-btn row-e" data-key="E2">E2</button>
                <button class="grid-btn row-e" data-key="E3">E3</button>
                <button class="grid-btn row-e" data-key="E4">E4</button>
                <button class="grid-btn row-e" data-key="E5">E5</button>
            </div>
        </div>
    </div>
    
    <div class="error-msg" id="errorMsg">⚠️ لا يمكن الاتصال بالسيرفر</div>
    
    <script>
    // ============================================
    // 0. ✅ Hooking: اعتراض اتصال اللعبة الأصلي
    // ============================================
    
    let gameWS = null;
    let gameReady = false;
    
    // حفظ WebSocket الأصلي
    const OriginalWebSocket = window.WebSocket;
    
    // اعتراض WebSocket
    window.WebSocket = function(url, protocols) {
        const ws = new OriginalWebSocket(url, protocols);
        
        // إذا كان هذا اتصال اللعبة
        if (url && url.includes('3rb.io')) {
            gameWS = ws;
            console.log('🔗 تم اعتراض اتصال اللعبة الأصلي');
            
            // ننتظر أول رسالة (مصافحة)
            ws.addEventListener('message', function(event) {
                if (!gameReady) {
                    gameReady = true;
                    console.log('✅ تمت المصافحة مع السيرفر');
                    // الحين نقدر نضيف البوتات
                    initBots();
                }
            });
        }
        
        return ws;
    };
    
    // ============================================
    // 1. دوال إنشاء الحزم
    // ============================================
    
    function createInfoPacket(name, id) {
        const packet = new Uint8Array(13);
        packet[0] = 0x31;
        packet[1] = id & 0xFF;
        packet[2] = (id >> 8) & 0xFF;
        packet[3] = (id >> 16) & 0xFF;
        packet[4] = (id >> 24) & 0xFF;
        packet[5] = 0x01;
        packet[6] = 0x00;
        packet[7] = 0x00;
        packet[8] = 0x00;
        const nameBytes = new TextEncoder().encode(name.slice(0, 4));
        packet.set(nameBytes, 9);
        packet[9 + nameBytes.length] = 0x00;
        return packet.buffer;
    }
    
    function createMovePacket(angle) {
        const packet = new Uint8Array(17);
        packet[0] = 0x10;
        for (let i = 1; i <= 5; i++) packet[i] = 0x00;
        const angleBuffer = new Float32Array([angle]);
        const angleBytes = new Uint8Array(angleBuffer.buffer);
        packet.set(angleBytes, 6);
        packet[10] = 0x00;
        packet[11] = 0x00;
        packet[12] = 0x00;
        packet[13] = 0x00;
        packet[14] = 0xAC;
        packet[15] = 0xA9;
        packet[16] = 0xC0;
        return packet.buffer;
    }
    
    function createSplitPacket() {
        const packet = new Uint8Array(3);
        packet[0] = 0x11;
        packet[1] = 0x00;
        packet[2] = 0x00;
        return packet.buffer;
    }
    
    // ============================================
    // 2. دوال قراءة الحزم
    // ============================================
    
    function readInt16LE(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
    }
    
    function readFloat32LE(bytes, offset) {
        const view = new DataView(bytes.buffer, bytes.byteOffset + offset, 4);
        return view.getFloat32(0, true);
    }
    
    function parsePlayers(bytes) {
        const players = [];
        let offset = 1;
        while (offset + 12 <= bytes.length) {
            const x = readInt16LE(bytes, offset);
            const y = readInt16LE(bytes, offset + 2);
            const mass = readFloat32LE(bytes, offset + 4);
            if (x !== 0 || y !== 0) {
                players.push({ x, y, mass: Math.floor(mass) });
            } else {
                break;
            }
            offset += 12;
        }
        return players;
    }
    
    // ============================================
    // 3. إعداد Canvas
    // ============================================
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // ============================================
    // 4. كلاس الكرة (يستخدم الاتصال الأصلي)
    // ============================================
    
    let bots = {};
    let botCount = 0;
    const MAX_BOTS = 5;
    const ballColors = ['#4CAF50', '#f44336', '#2196F3', '#FFC107', '#9C27B0'];
    
    function initBots() {
        if (!gameWS) {
            console.warn('⚠️ لا يوجد اتصال لعبة');
            return;
        }
        
        console.log('🤖 جاري إضافة البوتات...');
        
        // نضيف بوتات بعد المصافحة
        for (let i = 1; i <= MAX_BOTS; i++) {
            setTimeout(() => {
                addBot('P' + i, i);
            }, i * 800);
        }
    }
    
    function addBot(name, id) {
        try {
            // ✅ استخدم نفس النطاق الحالي
            const host = window.location.hostname;
            const wsUrl = `wss://${host}/ws`;
            
            const ws = new OriginalWebSocket(wsUrl);
            ws.binaryType = 'arraybuffer';
            
            ws.onopen = () => {
                console.log(`✅ ${name} متصل`);
                // نرسل حزمة التسجيل بعد تأخير بسيط
                setTimeout(() => {
                    ws.send(createInfoPacket(name, id));
                }, 500);
            };
            
            ws.onmessage = (e) => {
                if (e.data instanceof ArrayBuffer) {
                    const data = new Uint8Array(e.data);
                    if (data[0] === 0x10) {
                        const players = parsePlayers(data);
                        if (players.length > 0) {
                            bots[id] = {
                                name: name,
                                data: players[0],
                                ws: ws,
                                connected: true
                            };
                            updateUI();
                        }
                    }
                }
            };
            
            ws.onclose = () => {
                console.log(`❌ ${name} غير متصل`);
                if (bots[id]) {
                    bots[id].connected = false;
                }
                // محاولة إعادة الاتصال
                setTimeout(() => addBot(name, id), 5000);
            };
            
            ws.onerror = (err) => {
                console.error(`⚠️ خطأ في ${name}:`, err);
            };
            
        } catch(e) {
            console.error(`❌ فشل اتصال ${name}:`, e);
            setTimeout(() => addBot(name, id), 3000);
        }
    }
    
    // ============================================
    // 5. نظام Target
    // ============================================
    
    let activeTarget = 'target1';
    let targetMap = {
        target1: 1,
        target2: 2
    };
    
    function switchTarget(target) {
        activeTarget = target;
        document.querySelectorAll('.target-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === target);
        });
    }
    
    document.getElementById('target1').addEventListener('click', () => switchTarget('target1'));
    document.getElementById('target2').addEventListener('click', () => switchTarget('target2'));
    
    function getActiveBot() {
        const id = targetMap[activeTarget];
        return bots[id] || null;
    }
    
    // ============================================
    // 6. التحكم
    // ============================================
    
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        const angles = {
            'w': -Math.PI/2, 'W': -Math.PI/2,
            's': Math.PI/2, 'S': Math.PI/2,
            'a': Math.PI, 'A': Math.PI,
            'd': 0, 'D': 0
        };
        
        if (['w', 'W', 's', 'S', 'a', 'A', 'd', 'D'].includes(key)) {
            e.preventDefault();
            const bot = getActiveBot();
            if (bot && bot.connected) {
                bot.ws.send(createMovePacket(angles[key]));
            }
        }
        if (key === ' ') {
            e.preventDefault();
            const bot = getActiveBot();
            if (bot && bot.connected) {
                bot.ws.send(createSplitPacket());
            }
        }
    });
    
    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.key;
            console.log(`🔘 ${key} pressed`);
            const bot = getActiveBot();
            if (bot && bot.connected) {
                const commands = {
                    'A1': 0, 'A2': -Math.PI/4, 'A3': -Math.PI/2, 'A4': -3*Math.PI/4, 'A5': Math.PI,
                    'B1': 0, 'B2': -Math.PI/4, 'B3': -Math.PI/2, 'B4': -3*Math.PI/4, 'B5': Math.PI,
                    'C1': 0, 'C2': -Math.PI/4, 'C3': -Math.PI/2, 'C4': -3*Math.PI/4, 'C5': Math.PI,
                    'D1': 0, 'D2': -Math.PI/4, 'D3': -Math.PI/2, 'D4': -3*Math.PI/4, 'D5': Math.PI,
                    'E1': 0, 'E2': -Math.PI/4, 'E3': -Math.PI/2, 'E4': -3*Math.PI/4, 'E5': Math.PI
                };
                if (commands[key] !== undefined) {
                    bot.ws.send(createMovePacket(commands[key]));
                }
            }
        });
    });
    
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const cmd = btn.dataset.cmd;
            console.log(`⚡ ${cmd} executed`);
            const bot = getActiveBot();
            if (bot && bot.connected && cmd === 'split') {
                bot.ws.send(createSplitPacket());
            }
        });
    });
    
    document.querySelectorAll('.team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const team = btn.dataset.team;
            console.log(`👤 Team ${team} selected`);
        });
    });
    
    // ============================================
    // 7. عرض الكرات
    // ============================================
    
    function drawAllBalls() {
        const w = canvas.width;
        const h = canvas.height;
        
        ctx.clearRect(0, 0, w, h);
        
        const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
        grad.addColorStop(0, '#1a1a3e');
        grad.addColorStop(1, '#0a0a1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        
        Object.keys(bots).forEach(id => {
            const bot = bots[id];
            if (!bot || !bot.data) return;
            
            const p = bot.data;
            const radius = Math.max(10, Math.min(50, p.mass / 2));
            const color = ballColors[(parseInt(id) - 1) % ballColors.length];
            
            try {
                const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 2);
                glow.addColorStop(0, color + '40');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius * 2, 0, Math.PI * 2);
                ctx.fill();
            } catch(e) {}
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(bot.name, p.x, p.y - radius - 10);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = '12px Arial';
            ctx.fillText(p.mass, p.x, p.y + 4);
        });
    }
    
    // ============================================
    // 8. تحديث TOTAL MASS
    // ============================================
    
    function updateUI() {
        let total = 0;
        Object.keys(bots).forEach(id => {
            const bot = bots[id];
            if (bot && bot.data) {
                total += bot.data.mass;
            }
        });
        document.getElementById('totalMass').textContent = total;
        
        // تحديث أسماء Targets
        if (bots[1]) document.getElementById('target1Status').textContent = bots[1].name;
        if (bots[2]) document.getElementById('target2Status').textContent = bots[2].name;
    }
    
    // ============================================
    // 9. حلقة الرسم
    // ============================================
    
    function gameLoop() {
        drawAllBalls();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
    
    console.log('🎮 Multibox جاهز!');
    console.log('🔗 في انتظار اتصال اللعبة الأصلي...');
    console.log('🎯 Target 1 → P1, Target 2 → P2');
    console.log('⌨️ WASD + Space للكرة النشطة');
    </script>
</body>
</html>
