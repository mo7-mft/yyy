<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3rb.io - واجهة مزدوجة</title>
    <style>
        /* تصميم واجهتك */
    </style>
</head>
<body>
    <!-- واجهة HTML -->
    <div id="app">
        <canvas id="gameCanvas"></canvas>
        <div id="info">...</div>
        <button id="tabBtn">🔄 Tab</button>
        <button class="a">A1</button>
        <button class="a">A2</button>
        <!-- ... -->
    </div>

    <script>
    // ============================================
    // 1. الاتصال الأول (الكرة الظاهرة)
    // ============================================
    const ws1 = new WebSocket('wss://beta.3rb.io/ws');
    ws1.binaryType = 'arraybuffer';
    
    ws1.onopen = () => {
        console.log('✅ الكرة 1 متصلة');
        ws1.send(createInfoPacket('P1', 1));
    };
    
    ws1.onmessage = (e) => {
        const data = new Uint8Array(e.data);
        if (data[0] === 0x10) {
            // تحديث الكرة الأولى
            updatePlayer1(data);
        }
    };

    // ============================================
    // 2. الاتصال الثاني (المخفي)
    // ============================================
    const ws2 = new WebSocket('wss://beta.3rb.io/ws');
    ws2.binaryType = 'arraybuffer';
    
    ws2.onopen = () => {
        console.log('✅ الكرة 2 متصلة (مخفي)');
        ws2.send(createInfoPacket('P2', 2));
    };
    
    ws2.onmessage = (e) => {
        const data = new Uint8Array(e.data);
        if (data[0] === 0x10) {
            // تحديث الكرة الثانية (مخفي)
            updatePlayer2(data);
        }
    };

    // ============================================
    // 3. التبديل بين الكرتين (Tab)
    // ============================================
    let activePlayer = 1; // 1 أو 2
    
    document.getElementById('tabBtn').addEventListener('click', togglePlayer);
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            togglePlayer();
        }
    });
    
    function togglePlayer() {
        activePlayer = (activePlayer === 1) ? 2 : 1;
        // تحديث الواجهة للكرة النشطة
        updateUI();
    }

    // ============================================
    // 4. التحكم (WASD للكرة النشطة فقط)
    // ============================================
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        const angles = {
            'w': -Math.PI/2, 'W': -Math.PI/2,
            's': Math.PI/2, 'S': Math.PI/2,
            'a': Math.PI, 'A': Math.PI,
            'd': 0, 'D': 0
        };
        
        if (['w', 'W', 's', 'S', 'a', 'A', 'd', 'D'].includes(key)) {
            e.preventDefault();
            // إرسال الحركة للكرة النشطة فقط
            if (activePlayer === 1) {
                ws1.send(createMovePacket(angles[key]));
            } else {
                ws2.send(createMovePacket(angles[key]));
            }
        }
    });

    // ============================================
    // دوال إنشاء الحزم (من تحليلنا)
    // ============================================
    function createInfoPacket(name, id) { /* ... */ }
    function createMovePacket(angle) { /* ... */ }
    function createSplitPacket() { /* ... */ }
    function parsePlayers(bytes) { /* ... */ }

    // ============================================
    // دوال التحديث
    // ============================================
    let player1Data = { x: 0, y: 0, mass: 50 };
    let player2Data = { x: 0, y: 0, mass: 50 };
    
    function updatePlayer1(data) {
        const players = parsePlayers(data);
        if (players.length > 0) {
            player1Data = players[0];
            if (activePlayer === 1) drawPlayer(player1Data);
        }
    }
    
    function updatePlayer2(data) {
        const players = parsePlayers(data);
        if (players.length > 0) {
            player2Data = players[0];
            if (activePlayer === 2) drawPlayer(player2Data);
        }
    }
    
    function updateUI() {
        // تحديث المعلومات المعروضة
        document.getElementById('playerName').textContent = 
            activePlayer === 1 ? '🟢 الكرة 1' : '🔴 الكرة 2';
        // رسم الكرة النشطة
        if (activePlayer === 1) drawPlayer(player1Data);
        else drawPlayer(player2Data);
    }
    </script>
</body>
</html>
