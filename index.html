<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3rb.io - الواجهة المزدوجة</title>
    <style>
        /* نفس الستايل اللي عندك */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .container { display: flex; height: 100vh; width: 100vw; }
        .half { flex: 1; position: relative; overflow: hidden; }
        .half:first-child { border-right: 4px solid #4CAF50; }
        .half:last-child { border-left: 4px solid #f44336; }
        canvas { width: 100%; height: 100%; display: block; }
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 12px;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header .name { font-size: 18px; font-weight: bold; }
        .header .stats { display: flex; gap: 15px; margin-top: 5px; font-size: 13px; }
        .header .stats span { background: rgba(255,255,255,0.1); padding: 2px 12px; border-radius: 8px; }
        .p1-color { color: #4CAF50; }
        .p2-color { color: #f44336; }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        .btn {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:active { transform: scale(0.92); background: rgba(255,255,255,0.15); }
        .btn.a { border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .btn.b { border-color: rgba(244, 67, 54, 0.3); color: #f44336; }
        .status {
            position: absolute;
            top: 80px;
            right: 20px;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 10px;
            background: rgba(0,0,0,0.6);
            z-index: 10;
        }
        .status.online { color: #4CAF50; }
        .status.offline { color: #f44336; }
        .leaderboard {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
            min-width: 160px;
            max-height: 300px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }
        .leaderboard h3 { color: #ffd700; font-size: 14px; margin-bottom: 10px; text-align: center; }
        .leaderboard .entry { display: flex; justify-content: space-between; padding: 4px 0; color: #aaa; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leaderboard .entry .mass { color: #ffd700; font-weight: bold; }
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 8px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            z-index: 50;
        }
        /* تنسيق رسالة الخطأ */
        .error-msg {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- نصف 1 -->
        <div class="half" id="half1">
            <canvas id="canvas1"></canvas>
            <div class="header">
                <div class="name p1-color">🟢 لاعب 1</div>
                <div class="stats">
                    <span>⚡ <span id="mass1">50</span></span>
                    <span>⭐ <span id="score1">0</span></span>
                </div>
            </div>
            <div class="status offline" id="status1">● جاري الاتصال...</div>
            <div class="controls">
                <button class="btn a" data-player="1" data-dir="up">▲</button>
                <button class="btn a" data-player="1" data-dir="left">◀</button>
                <button class="btn a" data-player="1" data-dir="down">▼</button>
                <button class="btn a" data-player="1" data-dir="right">▶</button>
                <button class="btn a" id="split1">💥</button>
            </div>
        </div>
        
        <!-- نصف 2 -->
        <div class="half" id="half2">
            <canvas id="canvas2"></canvas>
            <div class="header">
                <div class="name p2-color">🔴 لاعب 2</div>
                <div class="stats">
                    <span>⚡ <span id="mass2">50</span></span>
                    <span>⭐ <span id="score2">0</span></span>
                </div>
            </div>
            <div class="status offline" id="status2">● جاري الاتصال...</div>
            <div class="controls">
                <button class="btn b" data-player="2" data-dir="up">▲</button>
                <button class="btn b" data-player="2" data-dir="left">◀</button>
                <button class="btn b" data-player="2" data-dir="down">▼</button>
                <button class="btn b" data-player="2" data-dir="right">▶</button>
                <button class="btn b" id="split2">💥</button>
            </div>
        </div>
    </div>
    
    <div class="leaderboard">
        <h3>🏆 المتصدرين</h3>
        <div id="leaderboardEntries">
            <div class="entry"><span>⏳ جاري التحميل...</span></div>
        </div>
    </div>
    
    <div class="error-msg" id="errorMsg">⚠️ لا يمكن الاتصال بالسيرفر</div>
    <div class="footer">🎮 3rb.io • الواجهة المزدوجة</div>
    
    <script>
    // ============================================
    // 1. دوال إنشاء الحزم (من التحليل السابق)
    // ============================================
    
    function createInfoPacket(name, id) {
        const packet = new Uint8Array(13);
        packet[0] = 0x31;
        packet[1] = id & 0xFF;
        packet[2] = (id >> 8) & 0xFF;
        packet[3] = (id >> 16) & 0xFF;
        packet[4] = (id >> 24) & 0xFF;
        packet[5] = 0x01;
        packet[6] = 0x00;
        packet[7] = 0x00;
        packet[8] = 0x00;
        const nameBytes = new TextEncoder().encode(name.slice(0, 4));
        packet.set(nameBytes, 9);
        packet[9 + nameBytes.length] = 0x00;
        return packet.buffer;
    }
    
    function createMovePacket(angle) {
        const packet = new Uint8Array(17);
        packet[0] = 0x10;
        for (let i = 1; i <= 5; i++) packet[i] = 0x00;
        const angleBuffer = new Float32Array([angle]);
        const angleBytes = new Uint8Array(angleBuffer.buffer);
        packet.set(angleBytes, 6);
        packet[10] = 0x00;
        packet[11] = 0x00;
        packet[12] = 0x00;
        packet[13] = 0x00;
        packet[14] = 0xAC;
        packet[15] = 0xA9;
        packet[16] = 0xC0;
        return packet.buffer;
    }
    
    function createSplitPacket() {
        const packet = new Uint8Array(3);
        packet[0] = 0x11;
        packet[1] = 0x00;
        packet[2] = 0x00;
        return packet.buffer;
    }
    
    // ============================================
    // 2. دوال قراءة الحزم
    // ============================================
    
    function readInt16LE(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
    }
    
    function readFloat32LE(bytes, offset) {
        const view = new DataView(bytes.buffer, bytes.byteOffset + offset, 4);
        return view.getFloat32(0, true);
    }
    
    function parsePlayers(bytes) {
        const players = [];
        let offset = 1;
        while (offset + 12 <= bytes.length) {
            const x = readInt16LE(bytes, offset);
            const y = readInt16LE(bytes, offset + 2);
            const mass = readFloat32LE(bytes, offset + 4);
            if (x !== 0 || y !== 0) {
                players.push({ x, y, mass: Math.floor(mass) });
            } else {
                break;
            }
            offset += 12;
        }
        return players;
    }
    
    // ============================================
    // 3. كلاس اللاعب (مع محاولة إعادة الاتصال)
    // ============================================
    
    class GamePlayer {
        constructor(canvasId, name, id, color, statusId, massId, scoreId) {
            this.canvas = document.getElementById(canvasId);
            this.ctx = this.canvas.getContext('2d');
            this.name = name;
            this.id = id;
            this.color = color;
            this.statusId = statusId;
            this.massId = massId;
            this.scoreId = scoreId;
            this.x = 0;
            this.y = 0;
            this.mass = 50;
            this.players = [];
            this.connected = false;
            this.reconnectAttempts = 0;
            this.maxReconnect = 3;
            
            this.resize();
            this.connect();
        }
        
        connect() {
            try {
                // ✅ إعدادات WebSocket الصحيحة
                this.ws = new WebSocket('wss://beta.3rb.io/ws');
                this.ws.binaryType = 'arraybuffer';
                
                this.ws.onopen = () => {
                    this.connected = true;
                    this.reconnectAttempts = 0;
                    const el = document.getElementById(this.statusId);
                    el.textContent = '● متصل';
                    el.className = 'status online';
                    document.getElementById('errorMsg').style.display = 'none';
                    this.ws.send(createInfoPacket(this.name, this.id));
                };
                
                this.ws.onmessage = (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        const data = new Uint8Array(e.data);
                        if (data[0] === 0x10) {
                            this.players = parsePlayers(data);
                            if (this.players.length > 0) {
                                this.x = this.players[0].x;
                                this.y = this.players[0].y;
                                this.mass = this.players[0].mass;
                                document.getElementById(this.massId).textContent = this.mass;
                                document.getElementById(this.scoreId).textContent = Math.floor(this.mass / 10);
                            }
                            this.draw();
                            if (this.id === 1) this.updateLeaderboard();
                        }
                    }
                };
                
                this.ws.onclose = () => {
                    this.connected = false;
                    const el = document.getElementById(this.statusId);
                    el.textContent = '● غير متصل';
                    el.className = 'status offline';
                    document.getElementById('errorMsg').style.display = 'block';
                    
                    // محاولة إعادة الاتصال
                    if (this.reconnectAttempts < this.maxReconnect) {
                        this.reconnectAttempts++;
                        setTimeout(() => this.connect(), 3000);
                    }
                };
                
                this.ws.onerror = () => {
                    // الخطأ سيتم التعامل معه في onclose
                };
                
            } catch(e) {
                console.error('خطأ في الاتصال:', e);
                setTimeout(() => this.connect(), 2000);
            }
        }
        
        resize() {
            const parent = this.canvas.parentElement;
            this.canvas.width = parent.clientWidth;
            this.canvas.height = parent.clientHeight;
        }
        
        sendMove(angle) {
            if (!this.connected) {
                console.warn(`${this.name}: غير متصل`);
                return;
            }
            this.ws.send(createMovePacket(angle));
        }
        
        sendSplit() {
            if (!this.connected) return;
            this.ws.send(createSplitPacket());
        }
        
        draw() {
            const ctx = this.ctx;
            const w = this.canvas.width;
            const h = this.canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            // خلفية
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
            grad.addColorStop(0, '#1a1a3e');
            grad.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            
            // رسم اللاعبين
            if (this.players.length === 0) {
                // رسالة انتظار
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏳ انتظار البيانات...', w/2, h/2);
                return;
            }
            
            this.players.forEach((p, i) => {
                const radius = Math.max(10, Math.min(50, p.mass / 2));
                const isSelf = i === 0;
                
                // توهج
                const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 2.5);
                glow.addColorStop(0, isSelf ? this.color + '40' : 'rgba(255,255,255,0.03)');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius * 2.5, 0, Math.PI * 2);
                ctx.fill();
                
                // الكرة
                ctx.shadowBlur = isSelf ? 25 : 5;
                ctx.shadowColor = isSelf ? this.color : '#333';
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = isSelf ? this.color : '#3a3a5a';
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (isSelf) {
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 15px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.name, p.x, p.y - radius - 12);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 13px Arial';
                    ctx.fillText(p.mass, p.x, p.y + 4);
                }
            });
        }
        
        updateLeaderboard() {
            const entries = document.getElementById('leaderboardEntries');
            const sorted = this.players.map((p, i) => ({
                name: i === 0 ? this.name : '👤 لاعب',
                mass: p.mass
            })).sort((a, b) => b.mass - a.mass);
            
            if (sorted.length === 0) {
                entries.innerHTML = '<div class="entry"><span>⏳ لا يوجد لاعبين</span></div>';
                return;
            }
            
            entries.innerHTML = sorted.slice(0, 8).map((p, i) => `
                <div class="entry">
                    <span>${i + 1}. ${p.name}</span>
                    <span class="mass">${p.mass}</span>
                </div>
            `).join('');
        }
    }
    
    // ============================================
    // 4. إنشاء اللاعبين
    // ============================================
    
    const player1 = new GamePlayer('canvas1', 'P1', 1, '#4CAF50', 'status1', 'mass1', 'score1');
    const player2 = new GamePlayer('canvas2', 'P2', 2, '#f44336', 'status2', 'mass2', 'score2');
    
    // ============================================
    // 5. التحكم
    // ============================================
    
    // لوحة المفاتيح
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        const angles = {
            'w': -Math.PI/2, 'W': -Math.PI/2,
            's': Math.PI/2, 'S': Math.PI/2,
            'a': Math.PI, 'A': Math.PI,
            'd': 0, 'D': 0,
            'ArrowUp': -Math.PI/2,
            'ArrowDown': Math.PI/2,
            'ArrowLeft': Math.PI,
            'ArrowRight': 0
        };
        
        if (['w', 'W', 's', 'S', 'a', 'A', 'd', 'D'].includes(key)) {
            e.preventDefault();
            player1.sendMove(angles[key]);
        }
        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
            e.preventDefault();
            player2.sendMove(angles[key]);
        }
        if (key === ' ') { e.preventDefault(); player1.sendSplit(); }
        if (key === 'Enter') { e.preventDefault(); player2.sendSplit(); }
    });
    
    // أزرار الشاشة
    document.querySelectorAll('.btn[data-dir]').forEach(btn => {
        const player = parseInt(btn.dataset.player);
        const dir = btn.dataset.dir;
        const angles = { up: -Math.PI/2, down: Math.PI/2, left: Math.PI, right: 0 };
        const p = player === 1 ? player1 : player2;
        
        const press = (e) => {
            e.preventDefault();
            p.sendMove(angles[dir]);
            btn.style.background = 'rgba(255,255,255,0.2)';
        };
        const release = () => { btn.style.background = ''; };
        
        btn.addEventListener('mousedown', press);
        btn.addEventListener('mouseup', release);
        btn.addEventListener('mouseleave', release);
        btn.addEventListener('touchstart', press);
        btn.addEventListener('touchend', release);
        btn.addEventListener('touchcancel', release);
    });
    
    document.getElementById('split1').addEventListener('click', () => player1.sendSplit());
    document.getElementById('split2').addEventListener('click', () => player2.sendSplit());
    
    // ============================================
    // 6. حلقة الرسم
    // ============================================
    
    window.addEventListener('resize', () => {
        player1.resize();
        player2.resize();
    });
    
    function gameLoop() {
        player1.draw();
        player2.draw();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
    
    console.log('🎮 الواجهة المزدوجة جاهزة!');
    console.log('👤 لاعب 1: WASD + Space (انقسام)');
    console.log('👤 لاعب 2: أسهم + Enter (انقسام)');
    console.log('📡 جاري الاتصال بالسيرفر...');
    </script>
</body>
</html>
