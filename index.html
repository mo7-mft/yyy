<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3rb.io - Multibox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* اللعبة (Canvas) */
        .game-area {
            flex: 1;
            position: relative;
            background: #0f0f2a;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* لوحة التحكم الجانبية */
        .sidebar {
            width: 280px;
            background: rgba(20, 20, 40, 0.95);
            border-left: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 100vh;
        }
        
        .sidebar h2 {
            color: #ffd700;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        /* الإعدادات */
        .settings {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
        }
        
        .settings label {
            display: block;
            font-size: 13px;
            color: #aaa;
            padding: 4px 0;
            cursor: pointer;
        }
        
        .settings label input {
            margin-right: 8px;
        }
        
        /* Targets */
        .targets {
            display: flex;
            gap: 10px;
        }
        
        .target-btn {
            flex: 1;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .target-btn.active {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        
        .target-btn .status {
            display: block;
            font-size: 10px;
            color: #666;
            margin-top: 4px;
        }
        
        /* TOTAL MASS */
        .total-mass {
            text-align: center;
            padding: 10px;
            background: rgba(255,215,0,0.1);
            border-radius: 8px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        
        .total-mass .number {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* أزرار التحكم السريع */
        .quick-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }
        
        .quick-btn {
            padding: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .quick-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .quick-btn:active {
            transform: scale(0.9);
        }
        
        /* Team Players */
        .team-players {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .team-btn {
            padding: 6px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        
        .team-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        
        /* شبكة الأزرار A1-E5 */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }
        
        .grid-btn {
            padding: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .grid-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }
        
        .grid-btn:active {
            transform: scale(0.9);
        }
        
        .grid-btn.row-a { border-color: rgba(76, 175, 80, 0.3); color: #4CAF50; }
        .grid-btn.row-b { border-color: rgba(33, 150, 243, 0.3); color: #2196F3; }
        .grid-btn.row-c { border-color: rgba(255, 193, 7, 0.3); color: #FFC107; }
        .grid-btn.row-d { border-color: rgba(255, 152, 0, 0.3); color: #FF9800; }
        .grid-btn.row-e { border-color: rgba(244, 67, 54, 0.3); color: #f44336; }
        
        /* رسالة الخطأ */
        .error-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #f44336;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 12px;
            z-index: 200;
            display: none;
        }
        
        /* Scrollbar */
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- منطقة اللعبة -->
        <div class="game-area">
            <canvas id="gameCanvas"></canvas>
        </div>
        
        <!-- لوحة التحكم -->
        <div class="sidebar">
            <h2>🎮 Multibox</h2>
            
            <!-- الإعدادات -->
            <div class="settings">
                <label><input type="checkbox" checked id="biggestCell"> BIGGEST CELL VIEWPORT</label>
                <label><input type="checkbox" checked id="followMouse"> VIEWPORT FOLLOWING MOUSE</label>
                <label><input type="checkbox" id="targetingPlayers"> TARGETING PLAYERS</label>
            </div>
            
            <!-- Targets -->
            <div class="targets">
                <button class="target-btn active" id="target1">
                    🎯 Target 1
                    <span class="status" id="target1Status">P1</span>
                </button>
                <button class="target-btn" id="target2">
                    🎯 Target 2
                    <span class="status" id="target2Status">P2</span>
                </button>
            </div>
            
            <!-- TOTAL MASS -->
            <div class="total-mass">
                TOTAL MASS
                <div class="number" id="totalMass">0</div>
            </div>
            
            <!-- أزرار التحكم السريع -->
            <div class="quick-buttons">
                <button class="quick-btn" data-cmd="follow">Follow</button>
                <button class="quick-btn" data-cmd="split">Split</button>
                <button class="quick-btn" data-cmd="eject">Eject</button>
                <button class="quick-btn" data-cmd="merge">Merge</button>
                <button class="quick-btn" data-cmd="stop">Stop</button>
                <button class="quick-btn" data-cmd="target">Target</button>
            </div>
            
            <!-- Team Players -->
            <div style="text-align:center;font-size:13px;color:#aaa;">Team players</div>
            <div class="team-players">
                <button class="team-btn" data-team="1">👤 1</button>
                <button class="team-btn" data-team="2">👤 2</button>
                <button class="team-btn" data-team="3">👤 3</button>
            </div>
            
            <!-- شبكة الأزرار A1-E5 -->
            <div class="grid-buttons">
                <button class="grid-btn row-a" data-key="A1">A1</button>
                <button class="grid-btn row-a" data-key="A2">A2</button>
                <button class="grid-btn row-a" data-key="A3">A3</button>
                <button class="grid-btn row-a" data-key="A4">A4</button>
                <button class="grid-btn row-a" data-key="A5">A5</button>
                
                <button class="grid-btn row-b" data-key="B1">B1</button>
                <button class="grid-btn row-b" data-key="B2">B2</button>
                <button class="grid-btn row-b" data-key="B3">B3</button>
                <button class="grid-btn row-b" data-key="B4">B4</button>
                <button class="grid-btn row-b" data-key="B5">B5</button>
                
                <button class="grid-btn row-c" data-key="C1">C1</button>
                <button class="grid-btn row-c" data-key="C2">C2</button>
                <button class="grid-btn row-c" data-key="C3">C3</button>
                <button class="grid-btn row-c" data-key="C4">C4</button>
                <button class="grid-btn row-c" data-key="C5">C5</button>
                
                <button class="grid-btn row-d" data-key="D1">D1</button>
                <button class="grid-btn row-d" data-key="D2">D2</button>
                <button class="grid-btn row-d" data-key="D3">D3</button>
                <button class="grid-btn row-d" data-key="D4">D4</button>
                <button class="grid-btn row-d" data-key="D5">D5</button>
                
                <button class="grid-btn row-e" data-key="E1">E1</button>
                <button class="grid-btn row-e" data-key="E2">E2</button>
                <button class="grid-btn row-e" data-key="E3">E3</button>
                <button class="grid-btn row-e" data-key="E4">E4</button>
                <button class="grid-btn row-e" data-key="E5">E5</button>
            </div>
        </div>
    </div>
    
    <div class="error-msg" id="errorMsg">⚠️ لا يمكن الاتصال بالسيرفر</div>
    
    <script>
    // ============================================
    // 1. دوال إنشاء الحزم (من تحليلنا)
    // ============================================
    
    function createInfoPacket(name, id) {
        const packet = new Uint8Array(13);
        packet[0] = 0x31;
        packet[1] = id & 0xFF;
        packet[2] = (id >> 8) & 0xFF;
        packet[3] = (id >> 16) & 0xFF;
        packet[4] = (id >> 24) & 0xFF;
        packet[5] = 0x01;
        packet[6] = 0x00;
        packet[7] = 0x00;
        packet[8] = 0x00;
        const nameBytes = new TextEncoder().encode(name.slice(0, 4));
        packet.set(nameBytes, 9);
        packet[9 + nameBytes.length] = 0x00;
        return packet.buffer;
    }
    
    function createMovePacket(angle) {
        const packet = new Uint8Array(17);
        packet[0] = 0x10;
        for (let i = 1; i <= 5; i++) packet[i] = 0x00;
        const angleBuffer = new Float32Array([angle]);
        const angleBytes = new Uint8Array(angleBuffer.buffer);
        packet.set(angleBytes, 6);
        packet[10] = 0x00;
        packet[11] = 0x00;
        packet[12] = 0x00;
        packet[13] = 0x00;
        packet[14] = 0xAC;
        packet[15] = 0xA9;
        packet[16] = 0xC0;
        return packet.buffer;
    }
    
    function createSplitPacket() {
        const packet = new Uint8Array(3);
        packet[0] = 0x11;
        packet[1] = 0x00;
        packet[2] = 0x00;
        return packet.buffer;
    }
    
    // ============================================
    // 2. دوال قراءة الحزم
    // ============================================
    
    function readInt16LE(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
    }
    
    function readFloat32LE(bytes, offset) {
        const view = new DataView(bytes.buffer, bytes.byteOffset + offset, 4);
        return view.getFloat32(0, true);
    }
    
    function parsePlayers(bytes) {
        const players = [];
        let offset = 1;
        while (offset + 12 <= bytes.length) {
            const x = readInt16LE(bytes, offset);
            const y = readInt16LE(bytes, offset + 2);
            const mass = readFloat32LE(bytes, offset + 4);
            if (x !== 0 || y !== 0) {
                players.push({ x, y, mass: Math.floor(mass) });
            } else {
                break;
            }
            offset += 12;
        }
        return players;
    }
    
    // ============================================
    // 3. إعداد Canvas
    // ============================================
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resize() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resize();
    window.addEventListener('resize', resize);
    
    // ============================================
    // 4. كلاس الكرة (GameBall)
    // ============================================
    
    class GameBall {
        constructor(name, id, color) {
            this.name = name;
            this.id = id;
            this.color = color;
            this.x = 0;
            this.y = 0;
            this.mass = 50;
            this.connected = false;
            this.players = [];
            this.reconnectAttempts = 0;
            this.maxReconnect = 5;
            
            this.connect();
        }
        
        connect() {
            try {
                // ✅ اتصال WebSocket مباشر
                this.ws = new WebSocket('wss://beta.3rb.io/ws');
                this.ws.binaryType = 'arraybuffer';
                
                this.ws.onopen = () => {
                    this.connected = true;
                    this.reconnectAttempts = 0;
                    console.log(`✅ ${this.name} متصل`);
                    this.ws.send(createInfoPacket(this.name, this.id));
                    document.getElementById('errorMsg').style.display = 'none';
                };
                
                this.ws.onmessage = (e) => {
                    if (e.data instanceof ArrayBuffer) {
                        const data = new Uint8Array(e.data);
                        if (data[0] === 0x10) {
                            this.players = parsePlayers(data);
                            if (this.players.length > 0) {
                                this.x = this.players[0].x;
                                this.y = this.players[0].y;
                                this.mass = this.players[0].mass;
                            }
                        }
                    }
                };
                
                this.ws.onclose = () => {
                    this.connected = false;
                    console.log(`❌ ${this.name} غير متصل`);
                    document.getElementById('errorMsg').style.display = 'block';
                    
                    if (this.reconnectAttempts < this.maxReconnect) {
                        this.reconnectAttempts++;
                        setTimeout(() => this.connect(), 3000);
                    }
                };
                
                this.ws.onerror = (err) => {
                    console.error(`⚠️ خطأ في ${this.name}:`, err);
                };
                
            } catch(e) {
                console.error(`❌ فشل اتصال ${this.name}:`, e);
                setTimeout(() => this.connect(), 2000);
            }
        }
        
        sendMove(angle) {
            if (!this.connected) {
                console.warn(`${this.name}: غير متصل`);
                return;
            }
            try {
                this.ws.send(createMovePacket(angle));
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
            }
        }
        
        sendSplit() {
            if (!this.connected) return;
            try {
                this.ws.send(createSplitPacket());
            } catch(e) {
                console.error('خطأ في الإرسال:', e);
            }
        }
    }
    
    // ============================================
    // 5. إنشاء الكرات
    // ============================================
    
    const balls = {};
    const ballColors = ['#4CAF50', '#f44336', '#2196F3', '#FFC107', '#9C27B0'];
    
    function addBall(name, id) {
        const color = ballColors[(id - 1) % ballColors.length];
        balls[id] = new GameBall(name, id, color);
    }
    
    // إضافة 5 كرات
    for (let i = 1; i <= 5; i++) {
        addBall('P' + i, i);
    }
    
    // ============================================
    // 6. نظام Target
    // ============================================
    
    let activeTarget = 'target1';
    let targetMap = {
        target1: 1,
        target2: 2
    };
    
    function switchTarget(target) {
        activeTarget = target;
        document.querySelectorAll('.target-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === target);
        });
    }
    
    document.getElementById('target1').addEventListener('click', () => switchTarget('target1'));
    document.getElementById('target2').addEventListener('click', () => switchTarget('target2'));
    
    function getActiveBall() {
        const id = targetMap[activeTarget];
        return balls[id] || null;
    }
    
    // ============================================
    // 7. التحكم
    // ============================================
    
    // لوحة المفاتيح
    document.addEventListener('keydown', (e) => {
        const key = e.key;
        const angles = {
            'w': -Math.PI/2, 'W': -Math.PI/2,
            's': Math.PI/2, 'S': Math.PI/2,
            'a': Math.PI, 'A': Math.PI,
            'd': 0, 'D': 0
        };
        
        if (['w', 'W', 's', 'S', 'a', 'A', 'd', 'D'].includes(key)) {
            e.preventDefault();
            const ball = getActiveBall();
            if (ball) ball.sendMove(angles[key]);
        }
        if (key === ' ') {
            e.preventDefault();
            const ball = getActiveBall();
            if (ball) ball.sendSplit();
        }
    });
    
    // أزرار الشبكة (A1-E5)
    document.querySelectorAll('.grid-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const key = btn.dataset.key;
            console.log(`🔘 ${key} pressed`);
            const ball = getActiveBall();
            if (ball) {
                // كل زر يرسل أمر مختلف
                const commands = {
                    'A1': 0, 'A2': -Math.PI/4, 'A3': -Math.PI/2, 'A4': -3*Math.PI/4, 'A5': Math.PI,
                    'B1': 0, 'B2': -Math.PI/4, 'B3': -Math.PI/2, 'B4': -3*Math.PI/4, 'B5': Math.PI,
                    'C1': 0, 'C2': -Math.PI/4, 'C3': -Math.PI/2, 'C4': -3*Math.PI/4, 'C5': Math.PI,
                    'D1': 0, 'D2': -Math.PI/4, 'D3': -Math.PI/2, 'D4': -3*Math.PI/4, 'D5': Math.PI,
                    'E1': 0, 'E2': -Math.PI/4, 'E3': -Math.PI/2, 'E4': -3*Math.PI/4, 'E5': Math.PI
                };
                if (commands[key] !== undefined) {
                    ball.sendMove(commands[key]);
                }
            }
        });
    });
    
    // أزرار التحكم السريع
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const cmd = btn.dataset.cmd;
            console.log(`⚡ ${cmd} executed`);
            const ball = getActiveBall();
            if (ball) {
                if (cmd === 'split') ball.sendSplit();
                // أوامر أخرى...
            }
        });
    });
    
    // أزرار Team
    document.querySelectorAll('.team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const team = btn.dataset.team;
            console.log(`👤 Team ${team} selected`);
        });
    });
    
    // ============================================
    // 8. عرض الكرات على Canvas
    // ============================================
    
    function drawAllBalls() {
        const w = canvas.width;
        const h = canvas.height;
        
        ctx.clearRect(0, 0, w, h);
        
        // خلفية
        const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w);
        grad.addColorStop(0, '#1a1a3e');
        grad.addColorStop(1, '#0a0a1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        
        // رسم كل الكرات
        Object.keys(balls).forEach(id => {
            const ball = balls[id];
            if (ball.players.length === 0) return;
            
            const p = ball.players[0];
            const radius = Math.max(10, Math.min(50, p.mass / 2));
            
            // توهج
            try {
                const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius * 2);
                glow.addColorStop(0, ball.color + '40');
                glow.addColorStop(1, 'transparent');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius * 2, 0, Math.PI * 2);
                ctx.fill();
            } catch(e) {}
            
            // الكرة
            ctx.shadowBlur = 20;
            ctx.shadowColor = ball.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // الاسم
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(ball.name, p.x, p.y - radius - 10);
            
            // الكتلة
            ctx.fillStyle = '#ffd700';
            ctx.font = '12px Arial';
            ctx.fillText(p.mass, p.x, p.y + 4);
        });
    }
    
    // ============================================
    // 9. تحديث TOTAL MASS
    // ============================================
    
    function updateTotalMass() {
        let total = 0;
        Object.keys(balls).forEach(id => {
            const ball = balls[id];
            if (ball.players.length > 0) {
                total += ball.players[0].mass;
            }
        });
        document.getElementById('totalMass').textContent = total;
    }
    
    // ============================================
    // 10. حلقة الرسم
    // ============================================
    
    function gameLoop() {
        drawAllBalls();
        updateTotalMass();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
    
    console.log('🎮 Multibox جاهز!');
    console.log('🔗 5 كرات متصلة');
    console.log('🎯 Target 1 → P1, Target 2 → P2');
    console.log('⌨️ WASD + Space للكرة النشطة');
    console.log('📡 جاري الاتصال بالسيرفر...');
    </script>
</body>
</html>
